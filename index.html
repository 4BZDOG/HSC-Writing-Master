<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSC Writing Studio | Written HSC Mastery...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "use-immer": "https://aistudiocdn.com/use-immer@^0.11.0",
    "immer": "https://aistudiocdn.com/immer@^10.2.0",
    "idb": "https://aistudiocdn.com/idb@^8.0.3",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "zod": "https://esm.sh/zod@^4.2.1"
  }
}
</script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'rgb(var(--color-primary) / <alpha-value>)',
              accent: 'rgb(var(--color-accent) / <alpha-value>)',
              'bg-base': 'rgb(var(--color-bg-base) / <alpha-value>)',
              'bg-surface': 'rgb(var(--color-bg-surface) / <alpha-value>)',
              'bg-surface-elevated': 'rgb(var(--color-bg-surface-elevated) / <alpha-value>)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              serif: ['Newsreader', 'Georgia', 'serif'],
            },
            animation: {
              'pulse-glow': 'pulseGlow 4s infinite ease-in-out',
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shimmer': 'shimmer 2s infinite linear',
              'spin-slow': 'spin 12s linear infinite',
            },
            keyframes: {
              pulseGlow: {
                '0%, 100%': { opacity: 0.2, transform: 'scale(1)' },
                '50%': { opacity: 0.4, transform: 'scale(1.05)' },
              },
              fadeIn: {
                '0%': { opacity: 0 },
                '100%': { opacity: 1 },
              },
              fadeInUp: {
                '0%': { opacity: 0, transform: 'translateY(20px) scale(0.98)' },
                '100%': { opacity: 1, transform: 'translateY(0) scale(1)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              }
            }
          }
        },
        plugins: [
          function({ addVariant }) {
            addVariant('light', '[data-theme="light"] &');
          }
        ]
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap');
      
      :root {
        --color-primary: 99 102 241;
        --color-accent: 14 165 233;
        --color-bg-base: 10 15 26;
        --color-bg-surface: 18 24 38;
        --color-bg-surface-elevated: 30 41 59;
        /* Added for component support */
        --color-bg-surface-inset: 13 18 29;
        --color-border-secondary: 255 255 255;
        
        --color-text-primary: 243 244 246;
        --color-text-secondary: 209 213 219;
        --color-text-muted: 156 163 175;
      }

      [data-theme="light"] {
        --color-primary: 79 70 229;
        --color-accent: 2 132 199;
        --color-bg-base: 248 250 252;
        --color-bg-surface: 255 255 255;
        --color-bg-surface-elevated: 255 255 255;
        --color-bg-surface-inset: 241 245 249;
        --color-border-secondary: 203 213 225;
        
        --color-text-primary: 15 23 42;
        --color-text-secondary: 51 65 85;
        --color-text-muted: 100 116 139;
      }

      body {
        background-color: rgb(var(--color-bg-base));
        color: rgb(var(--color-text-primary));
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      input:focus, textarea:focus, select:focus, button:focus {
        outline: none !important;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
      [data-theme="light"] .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); }

      .glass-card {
        background: rgba(var(--color-bg-surface), 0.7);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      [data-theme="light"] .glass-card {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      
      .mesh-overlay {
        background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 0v20M0 1h20' stroke='rgba(255,255,255,0.03)' stroke-width='0.5' fill='none'/%3E%3C/svg%3E");
      }

      /* Print Specification v2.2.1 */
      @media print {
        @page {
          margin: 15mm;
          size: auto;
        }

        html, body {
          background: white !important;
          color: black !important;
          font-family: 'Newsreader', serif !important;
          overflow: visible !important;
          height: auto !important;
        }

        /* Hide all UI elements from standard flow */
        header, 
        nav, 
        aside, 
        footer, 
        .no-print, 
        button, 
        .toast-container,
        #api-health-indicator,
        .mesh-overlay {
          display: none !important;
        }

        /* Hide the background app when a modal is open for printing */
        #root > div:not(.portal-root) {
            display: none !important;
        }

        /* Ensure portaled modal content fills the page */
        .fixed.inset-0 {
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: auto !important;
          background: white !important;
          display: block !important;
          overflow: visible !important;
          z-index: auto !important;
        }

        /* Modal content normalization */
        .max-h-\[95vh\] {
            max-height: none !important;
            height: auto !important;
            overflow: visible !important;
        }

        .bg-\[rgb\(var\(--color-bg-surface\)\)\] {
          background: white !important;
          border: none !important;
          box-shadow: none !important;
        }

        /* Type Formatting */
        h1, h2, h3, h4, h5, h6 {
            color: black !important;
            font-family: 'Inter', sans-serif !important;
        }

        .text-white {
            color: black !important;
        }

        .text-slate-400, .text-slate-500, .text-\[rgb\(var\(--color-text-muted\)\)\] {
            color: #444 !important;
        }

        /* Restore visibility to key components */
        .EvaluationDisplay {
            display: block !important;
            width: 100% !important;
        }

        /* Placard Gradients -> High Contrast */
        .bg-gradient-to-br, .bg-gradient-to-r {
            background: #f8fafc !important;
            border: 2px solid #e2e8f0 !important;
            color: black !important;
        }

        /* Spacing for print */
        .gap-8 { gap: 1rem !important; }
        .p-10, .p-8 { padding: 1rem !important; }

        /* Ensure Page Breaks */
        section {
            page-break-inside: avoid;
            margin-bottom: 2rem;
        }

        .CriteriaRow {
            page-break-inside: avoid;
            border-bottom: 1px solid #eee;
        }

        /* Force serif in the response blocks */
        .prose, .font-serif {
            font-family: 'Newsreader', serif !important;
            font-size: 11pt !important;
            line-height: 1.6 !important;
            color: black !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
