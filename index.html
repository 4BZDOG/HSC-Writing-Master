
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSC AI Writing Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "use-immer": "https://aistudiocdn.com/use-immer@^0.11.0",
    "immer": "https://aistudiocdn.com/immer@^10.2.0",
    "idb": "https://aistudiocdn.com/idb@^8.0.3",
    "crypto": "https://aistudiocdn.com/crypto@^1.0.1",
    "zod": "https://aistudiocdn.com/zod@^4.1.12",
    "pino": "https://aistudiocdn.com/pino@^10.1.0",
    "limiter": "https://aistudiocdn.com/limiter@^3.0.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0"
  }
}
</script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: 'rgb(var(--color-primary) / <alpha-value>)',
          accent: 'rgb(var(--color-accent) / <alpha-value>)',
          'bg-base': 'rgb(var(--color-bg-base) / <alpha-value>)',
          'bg-surface': 'rgb(var(--color-bg-surface) / <alpha-value>)',
          'bg-surface-elevated': 'rgb(var(--color-bg-surface-elevated) / <alpha-value>)',
          'bg-surface-inset': 'rgb(var(--color-bg-surface-inset) / <alpha-value>)',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
        animation: {
          'blob': 'blob 10s infinite',
          'spin-slow': 'spin 15s linear infinite',
        },
        keyframes: {
          blob: {
            "0%": { transform: "translate(0px, 0px) scale(1)" },
            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
            "100%": { transform: "translate(0px, 0px) scale(1)" },
          },
        },
      }
    },
    plugins: [
      function({ addVariant }) {
        addVariant('light', '[data-theme="light"] &');
      }
    ]
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
  
  :root {
    /* Sophisticated Color Palette - Dark Mode (Default) */
    --color-primary: 99 102 241; /* Indigo 500 */
    --color-primary-dark: 79 70 229; /* Indigo 600 */
    --color-accent: 14 165 233; /* Sky 500 */
    --color-accent-glow: 56 189 248; /* Sky 400 */
    --color-accent-dark: 2 132 199; /* Sky 600 */
    --color-success: 16 185 129; /* Emerald 500 */
    --color-warning: 245 158 11; /* Amber 500 */
    --color-danger: 239 68 68; /* Red 500 */
    --color-purple: 139 92 246; /* Violet 500 */
    --color-pink: 236 72 153; /* Pink 500 */
    
    /* Text colors */
    --color-text-primary: 243 244 246; /* Gray 100 */
    --color-text-secondary: 209 213 219; /* Gray 300 */
    --color-text-muted: 156 163 175; /* Gray 400 */
    --color-text-dim: 107 114 128; /* Gray 500 */
    
    /* Backgrounds */
    --color-bg-base: 10 15 26; /* Deep slate */
    --color-bg-surface: 15 23 42; /* Slate 900 */
    --color-bg-surface-elevated: 30 41 59; /* Slate 800 */
    --color-bg-surface-light: 51 65 85; /* Slate 700 */
    --color-bg-surface-inset: 2 6 23; /* Deep inset */
    
    /* Borders */
    --color-border-primary: 55 65 81; /* Slate 600 */
    --color-border-secondary: 71 85 105; /* Slate 600/700 */
    --color-border-accent: 56 189 248; /* Sky 400 */

    /* Ambient Light Spots */
    --color-spotlight: 30 41 59; /* Slate 800 */
    
    /* Gradients */
    --gradient-primary: linear-gradient(135deg, rgb(var(--color-primary)) 0%, rgb(var(--color-accent)) 100%);
    --gradient-success: linear-gradient(135deg, rgb(var(--color-success)) 0%, rgb(5 150 105) 100%);
    --gradient-danger: linear-gradient(135deg, rgb(var(--color-danger)) 0%, rgb(220 38 38) 100%);
    
    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    --shadow-accent: 0 0 15px rgba(var(--color-accent-glow), 0.4);
    
    /* Typography */
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Monaco, 'Cascadia Code', monospace;
    
    /* Spacing & Sizing */
    --spacing-px: 1px;
    --spacing-0: 0;
    --spacing-1: 0.25rem;
    --spacing-2: 0.5rem;
    --spacing-3: 0.75rem;
    --spacing-4: 1rem;
    --spacing-5: 1.25rem;
    --spacing-6: 1.5rem;
    --spacing-8: 2rem;
    --spacing-10: 2.5rem;
    --spacing-12: 3rem;
    --spacing-16: 4rem;
    
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    --radius-2xl: 1.5rem;
    
    /* Animations */
    --transition-instant: 100ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-fast: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
    --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Light Mode Overrides - High Readability & Bold */
  [data-theme="light"] {
    /* Base Colors - Deeper for better contrast on white */
    --color-primary: 79 70 229; /* Indigo 600 */
    --color-primary-dark: 67 56 202; /* Indigo 700 */
    --color-accent: 2 132 199; /* Sky 600 */
    --color-accent-glow: 3 105 161; /* Sky 700 */
    
    /* Text colors - High Contrast */
    --color-text-primary: 15 23 42; /* Slate 900 */
    --color-text-secondary: 51 65 85; /* Slate 700 */
    --color-text-muted: 71 85 105; /* Slate 600 */
    --color-text-dim: 100 116 139; /* Slate 500 */
    
    /* Backgrounds - Colorful & Distinct */
    --color-bg-base: 241 245 249; /* Slate 100 */
    --color-bg-surface: 255 255 255; /* White */
    --color-bg-surface-elevated: 255 255 255; /* White */
    --color-bg-surface-light: 248 250 252; /* Slate 50 */
    --color-bg-surface-inset: 241 245 249; /* Slate 100 Inset */
    
    /* Borders - BOLD & DEFINED */
    --color-border-primary: 203 213 225; /* Slate 300 */
    --color-border-secondary: 226 232 240; /* Slate 200 */
    --color-border-accent: 14 165 233; /* Sky 500 */

    /* Ambient Light Spots */
    --color-spotlight: 219 234 254; /* Blue 100 */
    
    /* Shadows - Harder & Darker for Lift */
    --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    --shadow-accent: 0 0 15px rgba(var(--color-accent), 0.25);
  }

  /* Keyframes */
  @keyframes blob {
    0% { transform: translate(0px, 0px) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0px, 0px) scale(1); }
  }
  @keyframes aurora {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  
  @keyframes toastSlideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes progress {
    from { width: 100%; }
    to { width: 0%; }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 10px rgba(var(--color-accent-glow), 0.3); }
    50% { box-shadow: 0 0 20px rgba(var(--color-accent-glow), 0.6); }
  }
  
  .animate-fade-in { 
    animation: fadeIn var(--transition-normal) forwards;
    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
  .animate-fade-in-up { animation: fadeInUp var(--transition-normal) forwards; }
  .animate-fade-in-up-sm { animation: fadeInUp var(--transition-fast) forwards; }
  .animate-slide-in { animation: slideInRight var(--transition-normal) forwards; }
  .animate-pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
  .animate-toast-entry { animation: toastSlideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .animate-blob { animation: blob 10s infinite; }
  .animation-delay-2000 { animation-delay: 2s; }
  .animation-delay-4000 { animation-delay: 4s; }
  .animation-delay-6000 { animation-delay: 6s; }
  
  @keyframes pulseBorder {
    0%, 100% {
      border-color: rgba(var(--color-accent), 0.3);
      box-shadow: 0 0 0 0 rgba(var(--color-accent-glow), 0.1);
    }
    50% {
      border-color: rgb(var(--color-accent));
      box-shadow: 0 0 12px 3px rgba(var(--color-accent-glow), 0.2);
    }
  }
  
  @keyframes shimmer {
    100% {
      transform: translateX(100%);
    }
  }

  .animate-shimmer {
    transform: translateX(-100%);
    animation: shimmer 2s infinite;
  }
  
  /* --- Interactive Hover Effects --- */
  
  .hover-lift {
    transition: transform 0.3s var(--ease-elastic), box-shadow 0.3s var(--ease-smooth), border-color 0.3s ease;
  }
  .hover-lift:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2), 0 0 15px -3px rgba(var(--color-accent), 0.1);
  }
  
  [data-theme="light"] .hover-lift:hover {
      box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1), 0 0 15px -3px rgba(0, 0, 0, 0.05);
  }
  
  .hover-scale {
    transition: transform 0.2s var(--ease-smooth);
  }
  .hover-scale:hover {
    transform: scale(1.05);
  }
  
  .hover-slide-right {
    transition: transform 0.2s var(--ease-smooth), background-color 0.2s ease;
  }
  .hover-slide-right:hover {
    transform: translateX(4px);
  }
  
  .hover-glow-border {
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .hover-glow-border:hover {
    border-color: rgba(var(--color-accent), 0.5);
    box-shadow: 0 0 12px rgba(var(--color-accent), 0.15);
  }
  
  .interactive-card {
    transition: all 0.3s var(--ease-smooth);
  }
  .interactive-card:hover {
    border-color: rgba(var(--color-accent), 0.4);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    transform: translateY(-2px);
  }

  /* Enhanced Selection Box Styles */
  .selection-box {
    background-color: rgba(var(--color-bg-surface-inset), 0.3);
    border-radius: 1rem;
    border: 1px solid rgba(var(--color-border-secondary), 0.6);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: visible !important; 
  }
  
  [data-theme="light"] .selection-box {
    background-color: rgba(var(--color-bg-surface), 0.8);
    border-color: rgba(var(--color-border-secondary), 1);
    box-shadow: var(--shadow-sm);
  }

  .selection-box:hover {
    border-color: rgba(var(--color-border-accent), 0.5);
    background-color: rgba(var(--color-bg-surface-inset), 0.6);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  
  [data-theme="light"] .selection-box:hover {
     background-color: #fff;
     border-color: rgba(var(--color-accent), 0.4);
  }

  .selection-box--selected {
    border-color: rgba(var(--color-primary), 0.4);
    background: linear-gradient(145deg, rgba(var(--color-primary), 0.05) 0%, rgba(var(--color-bg-surface-inset), 0.4) 100%);
    box-shadow: 0 4px 20px -5px rgba(var(--color-primary), 0.1);
  }
  
  .selection-box--selected::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    bottom: 12px;
    width: 4px;
    background: rgb(var(--color-primary));
    opacity: 0.8;
    box-shadow: 2px 0 10px rgba(var(--color-primary), 0.5);
    border-top-right-radius: 4px;
    border-bottom-right-radius: 4px;
  }

  .selection-box--next {
    animation: pulseBorder 3s infinite;
    border-color: rgba(var(--color-accent), 0.5);
    background-color: rgba(var(--color-bg-surface-inset), 0.6);
  }

  body {
    /* Removed direct background color to allow DynamicBackground to show */
    color: rgb(var(--color-text-primary));
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
  }
  
  body.no-scroll {
    overflow: hidden;
  }

  /* Premium Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(var(--color-bg-base), 0.5);
  }
  ::-webkit-scrollbar-thumb {
    background: rgb(var(--color-border-primary));
    border-radius: var(--radius-full);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgb(var(--color-border-secondary));
  }

  ::selection {
    background: rgba(var(--color-accent), 0.3);
    color: white;
  }
  
  [data-theme="light"] ::selection {
     background: rgba(var(--color-accent), 0.2);
     color: rgb(var(--color-primary-dark));
  }

  *:focus-visible {
    outline: 2px solid rgb(var(--color-accent));
    outline-offset: 2px;
  }
  
  /* PDF Export Reset */
  .pdf-export-mode {
    background-color: #ffffff !important;
    color: #000000 !important;
    border: none !important;
    box-shadow: none !important;
    padding: 20px !important;
    width: 100% !important;
    height: auto !important;
    overflow: visible !important;
    position: static !important;
    display: block !important;
  }
  .pdf-export-mode * {
    color: #1f2937 !important;
    text-shadow: none !important;
    box-shadow: none !important;
  }
</style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
